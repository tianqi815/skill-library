name: Validate Skills

on:
  pull_request:
    paths:
      - "skills/**"
      - "scripts/**"
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate SKILL.md files
        run: npm run validate
