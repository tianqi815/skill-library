name: Generate Catalog

# Optional: auto-commit catalog/skills.json after skill changes.
# Requires GitHub Actions to be enabled (billing OK) and contents: write permission.
# If Actions is unavailable, run locally: npm run catalog && git add catalog/skills.json

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "scripts/generate-catalog.mjs"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate skills
        run: npm run validate

      - name: Generate catalog
        run: npm run catalog

      - name: Commit catalog changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update skills catalog"
          file_pattern: catalog/skills.json
